<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <i class="fa-solid fa-tooth"></i>
      <h1>DentalCare</h1>
      <p>Complete Dental Practice Management</p>
    </div>
    <div class="auth-illustration">
      <div class="feature-list">
        <div class="feature-item">
          <i class="fa-solid fa-calendar-check"></i>
          <span>Smart Appointment Scheduling</span>
        </div>
        <div class="feature-item">
          <i class="fa-solid fa-users"></i>
          <span>Patient Records Management</span>
        </div>
        <div class="feature-item">
          <i class="fa-solid fa-file-invoice-dollar"></i>
          <span>Billing & Invoice Tracking</span>
        </div>
        <div class="feature-item">
          <i class="fa-solid fa-prescription"></i>
          <span>Digital Prescriptions</span>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-container">
      <div class="auth-form-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account to continue</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" [(ngModel)]="email" name="email" placeholder="doctor@dentalcare.com" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Enter your password" class="form-input">
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login">
          <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Sign In
        </button>
      </form>

      <div class="auth-divider">
        <span>or continue with</span>
      </div>

      <div class="social-login">
        <button class="social-btn">
          <i class="fa-brands fa-google"></i>
        </button>
        <button class="social-btn">
          <i class="fa-brands fa-microsoft"></i>
        </button>
        <button class="social-btn">
          <i class="fa-brands fa-apple"></i>
        </button>
      </div>

      <p class="auth-footer">
        Don't have an account? <a routerLink="/signup">Create Account</a>
      </p>
    </div>
  </div>
</div>
